name: Release Wayang

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-native:
    name: Native ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_name: wayang-standalone-linux-x86_64
            shell: bash
          - runner: macos-13
            asset_name: wayang-standalone-osx-x86_64
            shell: bash
          - runner: macos-14
            asset_name: wayang-standalone-osx-aarch_64
            shell: bash
          - runner: windows-latest
            asset_name: wayang-standalone-windows-x86_64.exe
            shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "25"
          cache: maven

      - name: Install native-image
        shell: bash
        run: |
          gu install native-image || true

      - name: Build native image (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: wayang
        run: |
          set -euo pipefail
          mvn -B -ntp -f pom.xml -pl runtime/wayang-runtime-standalone -am clean package -Dnative -DskipTests
          mkdir -p artifacts
          cp runtime/wayang-runtime-standalone/target/*-runner "artifacts/${{ matrix.asset_name }}"
          chmod +x "artifacts/${{ matrix.asset_name }}"

      - name: Build native image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: wayang
        run: |
          mvn -B -ntp -f pom.xml -pl runtime/wayang-runtime-standalone -am clean package -Dnative -DskipTests
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $runner = Get-ChildItem -Path runtime/wayang-runtime-standalone/target -Filter "*-runner.exe" | Select-Object -First 1
          if (-not $runner) { throw "Native executable not found." }
          Copy-Item $runner.FullName "artifacts/${{ matrix.asset_name }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: wayang/artifacts/${{ matrix.asset_name }}
          if-no-files-found: error

  build-jar-and-service-assets:
    name: Build jar and service assets
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build runnable jar
        shell: bash
        working-directory: wayang
        run: |
          set -euo pipefail
          mvn -B -ntp -f pom.xml -pl runtime/wayang-runtime-standalone -am clean package -DskipTests
          release_version="${RELEASE_TAG#v}"
          mkdir -p artifacts
          cp runtime/wayang-runtime-standalone/target/*-runner.jar "artifacts/wayang-runtime-standalone-${release_version}.jar"

      - name: Package service assets
        shell: bash
        working-directory: wayang
        run: |
          set -euo pipefail
          release_version="${RELEASE_TAG#v}"
          mkdir -p artifacts/service-assets/scripts/service
          cp -R scripts/service/linux artifacts/service-assets/scripts/service/
          cp -R scripts/service/macos artifacts/service-assets/scripts/service/
          cp -R scripts/service/windows artifacts/service-assets/scripts/service/
          cp scripts/INSTALL.md artifacts/service-assets/INSTALL.md
          (
            cd artifacts/service-assets
            zip -r "../wayang-service-assets-${release_version}.zip" .
          )

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayang-runtime-standalone-jar
          path: wayang/artifacts/wayang-runtime-standalone-*.jar
          if-no-files-found: error

      - name: Upload service assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayang-service-assets
          path: wayang/artifacts/wayang-service-assets-*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-native
      - build-jar-and-service-assets
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Download all assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify assets
        shell: bash
        run: |
          set -euo pipefail
          ls -lah release-assets

      - name: Create/Update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release-assets/wayang-standalone-linux-x86_64
            release-assets/wayang-standalone-osx-x86_64
            release-assets/wayang-standalone-osx-aarch_64
            release-assets/wayang-standalone-windows-x86_64.exe
            release-assets/wayang-runtime-standalone-*.jar
            release-assets/wayang-service-assets-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          body: |
            Wayang standalone release assets:
            - Native executables
            - Runnable standalone jar
            - Service helper scripts archive
            
            Service/runtime default paths:
            - `WAYANG_HOME` => `~/.wayang`
            - `WAYANG_GOLLEK_HOME` => `~/.wayang/gollek`
            - fallback => `~/.gollek`
