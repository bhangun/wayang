name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (no publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  issues: write

env:
  MAVEN_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"

jobs:
  # Build JAR (portable)
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Wayang root
        shell: bash
        run: |
          if [ -f wayang/pom.xml ]; then
            echo "WAYANG_ROOT=wayang" >> "$GITHUB_ENV"
          else
            echo "WAYANG_ROOT=." >> "$GITHUB_ENV"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JAR
        run: |
          mvn -f "${WAYANG_ROOT}/pom.xml" clean package -DskipTests -pl runtime/wayang-runtime-standalone -am

      - name: Rename JAR
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          mkdir -p "${WAYANG_ROOT}/artifacts"
          cp "${WAYANG_ROOT}/runtime/wayang-runtime-standalone/target/wayang-runtime-standalone-1.0.0-SNAPSHOT-runner.jar" \
             "${WAYANG_ROOT}/artifacts/wayang-runtime-standalone-${VERSION}.jar"
        shell: bash

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayang-jar
          path: ${{ env.WAYANG_ROOT }}/artifacts/wayang-runtime-standalone-*.jar
          retention-days: 7

  # Build native images for all platforms
  package-service-assets:
    name: Package Service Assets
    runs-on: ubuntu-latest
    needs:
      - build-native-linux-x86
      - build-native-linux-arm
      - build-native-macos-x86
      - build-native-macos-arm
      - build-native-windows
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Wayang root
        shell: bash
        run: |
          if [ -f wayang/pom.xml ]; then
            echo "WAYANG_ROOT=wayang" >> "$GITHUB_ENV"
          else
            echo "WAYANG_ROOT=." >> "$GITHUB_ENV"
          fi

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.WAYANG_ROOT }}/artifacts
          merge-multiple: true

      - name: Package service bundle
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p "${WAYANG_ROOT}/artifacts"
          mkdir -p "${WAYANG_ROOT}/service-bundle/bin"
          mkdir -p "${WAYANG_ROOT}/service-bundle/default-home/.wayang/bin"
          mkdir -p "${WAYANG_ROOT}/service-bundle/default-home/.wayang/config"
          mkdir -p "${WAYANG_ROOT}/service-bundle/default-home/.wayang/logs"
          mkdir -p "${WAYANG_ROOT}/service-bundle/default-home/.wayang/plugins"
          mkdir -p "${WAYANG_ROOT}/service-bundle/default-home/.wayang/secrets"
          mkdir -p "${WAYANG_ROOT}/service-bundle/default-home/.wayang/gollek/models"
          mkdir -p "${WAYANG_ROOT}/service-bundle/default-home/.wayang/gollek/storage"

          cp "${WAYANG_ROOT}"/artifacts/wayang-standalone-* "${WAYANG_ROOT}/service-bundle/bin/" 2>/dev/null || true
          cp "${WAYANG_ROOT}"/artifacts/wayang-standalone-*.exe "${WAYANG_ROOT}/service-bundle/bin/" 2>/dev/null || true
          cp "${WAYANG_ROOT}"/artifacts/wayang-standalone-* "${WAYANG_ROOT}/service-bundle/default-home/.wayang/bin/" 2>/dev/null || true
          cp "${WAYANG_ROOT}"/artifacts/wayang-standalone-*.exe "${WAYANG_ROOT}/service-bundle/default-home/.wayang/bin/" 2>/dev/null || true
          cp -R "${WAYANG_ROOT}/scripts/service" "${WAYANG_ROOT}/service-bundle/"
          cp "${WAYANG_ROOT}/scripts/INSTALL.md" "${WAYANG_ROOT}/service-bundle/INSTALL.md"
          cp "${WAYANG_ROOT}/runtime/wayang-runtime-standalone/src/main/resources/application.properties" \
             "${WAYANG_ROOT}/service-bundle/default-home/.wayang/config/application.properties"

          cat > "${WAYANG_ROOT}/service-bundle/README.md" << 'README'
          # Wayang Service Bundle

          This bundle includes:
          - Native Wayang executables in `bin/`
          - Native Wayang executables staged in `default-home/.wayang/bin/`
          - Service helpers under `service/`
          - Default home directory layout under `default-home/.wayang/`

          All state defaults to `~/.wayang/*`. Gollek data defaults to
          `~/.wayang/gollek/*` and falls back to `~/.gollek/*` only when
          `~/.wayang/gollek/*` cannot be created, or when you explicitly
          set `GOLLEK_HOME`.
          README

          cat > "${WAYANG_ROOT}/service-bundle/default-home/.wayang/config/env.example" << 'ENV'
          # Wayang home defaults
          WAYANG_HOME=$HOME/.wayang
          WAYANG_GOLLEK_HOME=$HOME/.wayang/gollek

          # Optional legacy fallback (set only if you explicitly want ~/.gollek/*)
          # GOLLEK_HOME=$HOME/.gollek
          ENV

          touch "${WAYANG_ROOT}/service-bundle/default-home/.wayang/config/.keep"
          touch "${WAYANG_ROOT}/service-bundle/default-home/.wayang/logs/.keep"
          touch "${WAYANG_ROOT}/service-bundle/default-home/.wayang/plugins/.keep"
          touch "${WAYANG_ROOT}/service-bundle/default-home/.wayang/secrets/.keep"
          touch "${WAYANG_ROOT}/service-bundle/default-home/.wayang/gollek/models/.keep"
          touch "${WAYANG_ROOT}/service-bundle/default-home/.wayang/gollek/storage/.keep"

          cd "${WAYANG_ROOT}"
          zip -r "artifacts/wayang-service-assets-${VERSION}.zip" service-bundle

      - name: Upload service assets
        uses: actions/upload-artifact@v4
        with:
          name: wayang-service-assets
          path: ${{ env.WAYANG_ROOT }}/artifacts/wayang-service-assets-*.zip
          retention-days: 7

  build-native-linux-x86:
    name: Build Native Linux x86_64
    runs-on: ubuntu-latest
    needs: []
    container:
      image: ghcr.io/graalvm/native-image-community:25
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Wayang root
        shell: bash
        run: |
          if [ -f wayang/pom.xml ]; then
            echo "WAYANG_ROOT=wayang" >> "$GITHUB_ENV"
          else
            echo "WAYANG_ROOT=." >> "$GITHUB_ENV"
          fi

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: /root/.m2
          key: linux-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: linux-m2

      - name: Build Native Image
        run: |
          mvn -f "${WAYANG_ROOT}/pom.xml" clean package -Pnative -DskipTests -pl runtime/wayang-runtime-standalone -am

      - name: Prepare Artifact
        run: |
          mkdir -p "${WAYANG_ROOT}/artifacts"
          mv "${WAYANG_ROOT}/runtime/wayang-runtime-standalone/target/wayang-runtime-standalone-1.0.0-SNAPSHOT-runner" \
             "${WAYANG_ROOT}/artifacts/wayang-standalone-linux-x86_64"
          chmod +x "${WAYANG_ROOT}/artifacts/wayang-standalone-linux-x86_64"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayang-standalone-linux-x86_64
          path: ${{ env.WAYANG_ROOT }}/artifacts/wayang-standalone-linux-x86_64
          retention-days: 7

  build-native-linux-arm:
    name: Build Native Linux ARM64
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Wayang root
        shell: bash
        run: |
          if [ -f wayang/pom.xml ]; then
            echo "WAYANG_ROOT=wayang" >> "$GITHUB_ENV"
          else
            echo "WAYANG_ROOT=." >> "$GITHUB_ENV"
          fi

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: linux-arm-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: linux-arm-m2

      - name: Build Native Image (cross-compile)
        run: |
          mvn -f "${WAYANG_ROOT}/pom.xml" clean package -Pnative -DskipTests -pl runtime/wayang-runtime-standalone -am \
            -Dquarkus.native.container-build=true \
            -Dquarkus.native.container-runtime=docker \
            -Dquarkus.native.native-image-xbuild-image-args=--platform=linux/arm64

      - name: Prepare Artifact
        run: |
          mkdir -p "${WAYANG_ROOT}/artifacts"
          mv "${WAYANG_ROOT}/runtime/wayang-runtime-standalone/target/wayang-runtime-standalone-1.0.0-SNAPSHOT-runner" \
             "${WAYANG_ROOT}/artifacts/wayang-standalone-linux-aarch_64"
          chmod +x "${WAYANG_ROOT}/artifacts/wayang-standalone-linux-aarch_64"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayang-standalone-linux-aarch_64
          path: ${{ env.WAYANG_ROOT }}/artifacts/wayang-standalone-linux-aarch_64
          retention-days: 7

  build-native-macos-x86:
    name: Build Native macOS x86_64
    runs-on: macos-13
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Wayang root
        shell: bash
        run: |
          if [ -f wayang/pom.xml ]; then
            echo "WAYANG_ROOT=wayang" >> "$GITHUB_ENV"
          else
            echo "WAYANG_ROOT=." >> "$GITHUB_ENV"
          fi

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: macos-x86-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: macos-x86-m2

      - name: Build Native Image
        run: |
          mvn -f "${WAYANG_ROOT}/pom.xml" clean package -Pnative -DskipTests -pl runtime/wayang-runtime-standalone -am

      - name: Prepare Artifact
        run: |
          mkdir -p "${WAYANG_ROOT}/artifacts"
          mv "${WAYANG_ROOT}/runtime/wayang-runtime-standalone/target/wayang-runtime-standalone-1.0.0-SNAPSHOT-runner" \
             "${WAYANG_ROOT}/artifacts/wayang-standalone-osx-x86_64"
          chmod +x "${WAYANG_ROOT}/artifacts/wayang-standalone-osx-x86_64"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayang-standalone-osx-x86_64
          path: ${{ env.WAYANG_ROOT }}/artifacts/wayang-standalone-osx-x86_64
          retention-days: 7

  build-native-macos-arm:
    name: Build Native macOS ARM64
    runs-on: macos-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Wayang root
        shell: bash
        run: |
          if [ -f wayang/pom.xml ]; then
            echo "WAYANG_ROOT=wayang" >> "$GITHUB_ENV"
          else
            echo "WAYANG_ROOT=." >> "$GITHUB_ENV"
          fi

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: macos-arm-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: macos-arm-m2

      - name: Build Native Image
        run: |
          mvn -f "${WAYANG_ROOT}/pom.xml" clean package -Pnative -DskipTests -pl runtime/wayang-runtime-standalone -am

      - name: Prepare Artifact
        run: |
          mkdir -p "${WAYANG_ROOT}/artifacts"
          mv "${WAYANG_ROOT}/runtime/wayang-runtime-standalone/target/wayang-runtime-standalone-1.0.0-SNAPSHOT-runner" \
             "${WAYANG_ROOT}/artifacts/wayang-standalone-osx-aarch_64"
          chmod +x "${WAYANG_ROOT}/artifacts/wayang-standalone-osx-aarch_64"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayang-standalone-osx-aarch_64
          path: ${{ env.WAYANG_ROOT }}/artifacts/wayang-standalone-osx-aarch_64
          retention-days: 7

  build-native-windows:
    name: Build Native Windows x86_64
    runs-on: windows-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Wayang root
        shell: bash
        run: |
          if [ -f wayang/pom.xml ]; then
            echo "WAYANG_ROOT=wayang" >> "$GITHUB_ENV"
          else
            echo "WAYANG_ROOT=." >> "$GITHUB_ENV"
          fi

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\npm-cache
          key: windows-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: windows-m2

      - name: Build Native Image
        run: |
          mvn -f "${WAYANG_ROOT}/pom.xml" clean package -Pnative -DskipTests -pl runtime/wayang-runtime-standalone -am
        shell: bash

      - name: Prepare Artifact
        run: |
          mkdir -p "${WAYANG_ROOT}/artifacts"
          mv "${WAYANG_ROOT}/runtime/wayang-runtime-standalone/target/wayang-runtime-standalone-1.0.0-SNAPSHOT-runner.exe" \
             "${WAYANG_ROOT}/artifacts/wayang-standalone-windows-x86_64.exe"
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayang-standalone-windows-x86_64
          path: ${{ env.WAYANG_ROOT }}/artifacts/wayang-standalone-windows-x86_64.exe
          retention-days: 7

  # Release and publish
  release:
    name: Release with JReleaser
    needs: [build-jar, package-service-assets, build-native-linux-x86, build-native-linux-arm, build-native-macos-x86, build-native-macos-arm, build-native-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Wayang root
        shell: bash
        run: |
          if [ -f wayang/pom.xml ]; then
            echo "WAYANG_ROOT=wayang" >> "$GITHUB_ENV"
          else
            echo "WAYANG_ROOT=." >> "$GITHUB_ENV"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.WAYANG_ROOT }}/artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la "${WAYANG_ROOT}/artifacts"
        shell: bash

      - name: Run JReleaser (Dry Run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: bash
        run: |
          mvn -f "${WAYANG_ROOT}/pom.xml" jreleaser:dry-run -Djreleaser.git.root.search=true -Djreleaser.config.file="${WAYANG_ROOT}/jreleaser.yml"
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_DOCKER_DOCKER_IO_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          JRELEASER_DOCKER_DOCKER_IO_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          JRELEASER_CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          JRELEASER_SDKMAN_CONSUMER_KEY: ${{ secrets.SDKMAN_CONSUMER_KEY }}
          JRELEASER_SDKMAN_CONSUMER_TOKEN: ${{ secrets.SDKMAN_CONSUMER_TOKEN }}

      - name: Run JReleaser (Full Release)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          mvn -f "${WAYANG_ROOT}/pom.xml" jreleaser:full-release -Djreleaser.git.root.search=true -Djreleaser.config.file="${WAYANG_ROOT}/jreleaser.yml"
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_DOCKER_DOCKER_IO_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          JRELEASER_DOCKER_DOCKER_IO_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          JRELEASER_CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          JRELEASER_SDKMAN_CONSUMER_KEY: ${{ secrets.SDKMAN_CONSUMER_KEY }}
          JRELEASER_SDKMAN_CONSUMER_TOKEN: ${{ secrets.SDKMAN_CONSUMER_TOKEN }}

      - name: Upload service assets to GitHub Release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          gh release upload "${TAG}" "${WAYANG_ROOT}/artifacts/wayang-service-assets-${VERSION}.zip" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-output
          path: |
            ${{ env.WAYANG_ROOT }}/target/jreleaser/
            ${{ env.WAYANG_ROOT }}/target/jreleaser/logs/
          retention-days: 7
