name: wayang-designer-macos

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/wayang-designer-macos.yml"
      - "wayang-ui/wayang_designer/**"
      - "wayang-ui/wayang_components/wy_core/**"
 
jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    env:
      FLUTTER_VERSION: "3.29.0"
      WORKDIR: wayang-ui/wayang_designer
      WAYANG_GOOGLE_CLIENT_ID: ${{ secrets.WAYANG_GOOGLE_CLIENT_ID }}
      WAYANG_AUTH_BASE_URL: ${{ secrets.WAYANG_AUTH_BASE_URL }}
      WAYANG_GITHUB_CLIENT_ID: ${{ secrets.WAYANG_GITHUB_CLIENT_ID }}
      APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Validate required secrets
        run: |
          [[ -n "${WAYANG_GOOGLE_CLIENT_ID}" ]] || { echo "Missing secret: WAYANG_GOOGLE_CLIENT_ID"; exit 1; }
          [[ -n "${WAYANG_AUTH_BASE_URL}" ]] || { echo "Missing secret: WAYANG_AUTH_BASE_URL"; exit 1; }
          [[ -n "${WAYANG_GITHUB_CLIENT_ID}" ]] || { echo "Missing secret: WAYANG_GITHUB_CLIENT_ID"; exit 1; }

      - name: Create prod env file from secrets
        working-directory: ${{ env.WORKDIR }}
        run: |
          mkdir -p env
          cat > env/prod.json <<EOF
          {
            "WAYANG_ENABLE_GOOGLE_SIGN_IN": "true",
            "WAYANG_GOOGLE_CLIENT_ID": "${WAYANG_GOOGLE_CLIENT_ID}",
            "WAYANG_AUTH_BASE_URL": "${WAYANG_AUTH_BASE_URL}",
            "WAYANG_GITHUB_CLIENT_ID": "${WAYANG_GITHUB_CLIENT_ID}"
          }
          EOF

      - name: Build macOS
        working-directory: ${{ env.WORKDIR }}
        run: ./tool/build_macos.sh prod build

      - name: Detect built app bundle
        id: detect_app
        working-directory: ${{ env.WORKDIR }}
        run: |
          RELEASE_DIR="build/macos/Build/Products/Release"
          APP_PATH="$(find "$RELEASE_DIR" -maxdepth 1 -type d -name "*.app" | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "No .app bundle found in $RELEASE_DIR"
            exit 1
          fi
          APP_NAME="$(basename "$APP_PATH")"
          ZIP_NAME="${APP_NAME%.app}-macos.zip"

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Detect signing/notarization configuration
        id: detect_security
        run: |
          SIGNING_ENABLED=false
          NOTARIZATION_ENABLED=false
          if [[ -n "${APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64}" && -n "${APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD}" && -n "${APPLE_KEYCHAIN_PASSWORD}" ]]; then
            SIGNING_ENABLED=true
          fi
          if [[ "${SIGNING_ENABLED}" == "true" && -n "${APPLE_ID}" && -n "${APPLE_APP_SPECIFIC_PASSWORD}" && -n "${APPLE_TEAM_ID}" ]]; then
            NOTARIZATION_ENABLED=true
          fi
          echo "signing_enabled=${SIGNING_ENABLED}" >> "$GITHUB_OUTPUT"
          echo "notarization_enabled=${NOTARIZATION_ENABLED}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate (optional)
        if: steps.detect_security.outputs.signing_enabled == 'true'
        working-directory: ${{ env.WORKDIR }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build-signing.keychain-db"
          echo "${APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64}" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${APPLE_KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "${APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "${APPLE_KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"

      - name: Codesign app bundle (optional)
        if: steps.detect_security.outputs.signing_enabled == 'true'
        working-directory: ${{ env.WORKDIR }}
        run: |
          APP_PATH="${{ steps.detect_app.outputs.app_path }}"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "App bundle not found at $APP_PATH"
            exit 1
          fi
          IDENTITY="$(security find-identity -v -p codesigning | awk -F\" '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "$IDENTITY" ]]; then
            echo "No Developer ID Application identity found in keychain."
            exit 1
          fi
          /usr/bin/codesign --force --deep --options runtime --timestamp --sign "$IDENTITY" "$APP_PATH"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package app
        working-directory: ${{ env.WORKDIR }}
        run: |
          APP_PATH="${{ steps.detect_app.outputs.app_path }}"
          ZIP_PATH="${{ steps.detect_app.outputs.zip_name }}"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "App bundle not found at $APP_PATH"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Notarize app (optional)
        if: steps.detect_security.outputs.notarization_enabled == 'true'
        working-directory: ${{ env.WORKDIR }}
        run: |
          APP_PATH="${{ steps.detect_app.outputs.app_path }}"
          ZIP_PATH="${{ steps.detect_app.outputs.zip_name }}"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait
          xcrun stapler staple "$APP_PATH"
          # Repackage stapled app
          rm -f "$ZIP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: wayang_designer-macos-app
          path: wayang-ui/wayang_designer/${{ steps.detect_app.outputs.app_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: wayang_designer-macos-zip
          path: wayang-ui/wayang_designer/${{ steps.detect_app.outputs.zip_name }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish build summary
        if: always()
        run: |
          {
            echo "## Wayang Designer macOS Build"
            echo ""
            echo "- App bundle: \`${{ steps.detect_app.outputs.app_name || 'n/a' }}\`"
            echo "- App path: \`${{ env.WORKDIR }}/${{ steps.detect_app.outputs.app_path || 'n/a' }}\`"
            echo "- Zip path: \`${{ env.WORKDIR }}/${{ steps.detect_app.outputs.zip_name || 'n/a' }}\`"
            echo "- Signing enabled: \`${{ steps.detect_security.outputs.signing_enabled || 'false' }}\`"
            echo "- Notarization enabled: \`${{ steps.detect_security.outputs.notarization_enabled || 'false' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup generated prod env file
        if: always()
        working-directory: ${{ env.WORKDIR }}
        run: |
          rm -f env/prod.json
          rm -f "$RUNNER_TEMP/developer_id_application.p12" "$RUNNER_TEMP/build-signing.keychain-db"
