# ============================================================
# Wayang Assistant – default configuration
# ============================================================

# --- Documentation & knowledge sources ----------------------

# Local docs path (relative to the process working directory)
wayang.docs.path=website/wayang.github.io

# Enable/disable fetching remote GitHub Pages documentation sites
# Sites: wayang-ai.github.io, gollek-ai.github.io, gamelan-ai.github.io
wayang.assistant.remote-docs.enabled=true

# Enable/disable cloning GitHub source repos for RAG search
# Repos: bhangun/wayang, bhangun/gollek, bhangun/gamelan
wayang.assistant.github-rag.enabled=true

# --- Cache --------------------------------------------------

# Base directory for all remote/repo caches (resolved at runtime)
wayang.assistant.cache.dir=${user.home}/.wayang/assistant-cache

# How many hours to keep cached docs before re-downloading
wayang.assistant.cache.ttl-hours=24

# --- Search -------------------------------------------------

# Maximum number of results returned by a single documentation search
wayang.assistant.max-doc-results=10

# --- Session ------------------------------------------------

# Maximum number of simultaneously active chat sessions in memory
wayang.assistant.session.max-sessions=500

# --- Logs ---------------------------------------------------

# Path to the server log file (Quarkus default)
wayang.logs.server.path=target/quarkus.log

# Path to the UI/Desktop log file
wayang.logs.ui.path=${user.home}/Library/Logs/Wayang/desktop.log
