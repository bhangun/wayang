# Wayang Standalone Runtime Configuration
# This configuration file sets up all components for standalone operation
# Force this config source to override transitive application.properties from dependencies.
config_ordinal=1000

# Filesystem defaults (all local state under ~/.wayang)
wayang.home=${WAYANG_HOME:${user.home}/.wayang}
wayang.config.dir=${WAYANG_CONFIG_DIR:${wayang.home}/config}
wayang.logs.dir=${WAYANG_LOG_DIR:${wayang.home}/logs}
wayang.logs.server.dir=${WAYANG_SERVER_LOG_DIR:${wayang.logs.dir}/server}
wayang.plugins.dir=${WAYANG_PLUGINS_DIR:${wayang.home}/plugins}
wayang.secrets.dir=${WAYANG_SECRETS_DIR:${wayang.home}/secrets}
wayang.gollek.home=${WAYANG_GOLLEK_HOME:${GOLLEK_HOME:${wayang.home}/gollek}}
wayang.gollek.models.dir=${WAYANG_GOLLEK_MODELS_DIR:${wayang.gollek.home}/models}
wayang.gollek.storage.dir=${WAYANG_GOLLEK_STORAGE_DIR:${wayang.gollek.home}/storage}

# Quarkus Application Configuration
quarkus.application.name=wayang-standalone
quarkus.application.version=1.0.0
quarkus.package.main-class=tech.kayys.wayang.runtime.standalone.StandaloneRuntime
quarkus.otel.enabled=true
quarkus.otel.sdk.disabled=true
quarkus.otel.exporter.otlp.traces.enabled=false
quarkus.devservices.enabled=false

# HTTP Server Configuration
quarkus.http.port=31713
quarkus.http.root-path=/
quarkus.http.non-application-root-path=/q
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,X-Requested-With,accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers
quarkus.grpc.server.use-separate-server=false

# Hibernate ORM Configuration
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.database.charset=UTF-8
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=no-file
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect

# Global standalone datasource defaults (always active)
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:wayangdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS WAYANG\;SET SCHEMA WAYANG
quarkus.datasource.jdbc.driver=org.h2.Driver
quarkus.datasource.reactive=false

# Community Mode (default): Embedded H2 in PostgreSQL compatibility mode
%community.quarkus.datasource.db-kind=h2
%community.quarkus.datasource.username=sa
%community.quarkus.datasource.password=
%community.quarkus.datasource.jdbc.url=jdbc:h2:mem:wayangdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS WAYANG\;SET SCHEMA WAYANG
%community.quarkus.datasource.jdbc.driver=org.h2.Driver
%community.quarkus.datasource.reactive=false
%community.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%community.quarkus.hibernate-orm.sql-load-script=no-file
%community.quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect

# Enterprise Mode: External PostgreSQL, cloud-native lifecycle
%enterprise.quarkus.datasource.db-kind=postgresql
%enterprise.quarkus.datasource.username=${WAYANG_DB_USERNAME:wayang}
%enterprise.quarkus.datasource.password=${WAYANG_DB_PASSWORD:wayang}
%enterprise.quarkus.datasource.jdbc.url=${WAYANG_DB_JDBC_URL:jdbc:postgresql://localhost:5432/wayang}
%enterprise.quarkus.datasource.reactive=true
%enterprise.quarkus.datasource.reactive.url=${WAYANG_DB_REACTIVE_URL:postgresql://localhost:5432/wayang}
%enterprise.quarkus.hibernate-orm.schema-management.strategy=validate
%enterprise.quarkus.hibernate-orm.sql-load-script=no-file
%enterprise.quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging Configuration
# Default severity: INFO, WARN, ERROR (no DEBUG/TRACE unless explicitly enabled)
wayang.log.level.root=${WAYANG_LOG_LEVEL:INFO}
quarkus.log.level=${wayang.log.level.root}
quarkus.log.category."tech.kayys".level=${WAYANG_LOG_LEVEL_TECH_KAYYS:${wayang.log.level.root}}
quarkus.log.category."io.quarkus".level=${WAYANG_LOG_LEVEL_QUARKUS:WARN}
quarkus.log.category."ai.enterprise.inference.converter.gguf".min-level=${WAYANG_LOG_LEVEL_GGUF_MIN:INFO}
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.file.enabled=${WAYANG_LOG_FILE_ENABLED:true}
quarkus.log.file.level=${WAYANG_LOG_FILE_LEVEL:${wayang.log.level.root}}
quarkus.log.file.path=${WAYANG_LOG_FILE_PATH:${wayang.logs.server.dir}/server.log}
# Avoid SmallRye expression parsing issues with nested braces in pattern defaults.
# Override using plain Quarkus properties at runtime if needed.
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.file.rotation.max-file-size=${WAYANG_LOG_ROTATE_MAX_FILE_SIZE:20M}
quarkus.log.file.rotation.max-backup-index=${WAYANG_LOG_ROTATE_MAX_BACKUP_INDEX:10}

# Health Checks
quarkus.smallrye-health.root-path=/health

# OpenAPI and Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=swagger-ui
quarkus.swagger-ui.urls.default=/q/openapi
quarkus.smallrye-openapi.path=openapi
# Override inherited info from dependencies
quarkus.smallrye-openapi.info-title=Wayang Standalone API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Enterprise AI platform for local and cloud inference
mp.openapi.servers=/

# Metrics
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# Baseline defaults (always available even when no profile is active)
quarkus.profile=community
wayang.multitenancy.enabled=true
gamelan.tenant.default-id=community
gamelan.tenant.allow-default=true
wayang.runtime.standalone.projects-resource.enabled=true

# Multitenancy and tenant defaults by mode
%community.wayang.multitenancy.enabled=true
%community.gamelan.tenant.default-id=community
%community.gamelan.tenant.allow-default=true
%enterprise.wayang.multitenancy.enabled=false
%enterprise.gamelan.tenant.default-id=enterprise-default
%enterprise.gamelan.tenant.allow-default=false

# Plugin Configuration
wayang.plugins.auto-discovery=true
wayang.plugins.scan-packages=tech.kayys.wayang
wayang.plugins.directory=${wayang.plugins.dir}

# Schema Validation Configuration
wayang.schema.validation.enabled=true
wayang.schema.cache-enabled=true
wayang.schema.cache-size=100

# Embedded State Store Configuration (using in-memory solution for standalone)
# For workflow execution state, we use an embedded solution
wayang.state-store.type=embedded
wayang.state-store.embedded.backend=memory
gamelan.registry.persistence.type=memory

# Gamelan Orchestration Configuration
gamelan.orchestration.mode=embedded
gamelan.state-management.backend=embedded
gamelan.execution.timeout=300S
gamelan.execution.max-concurrent-runs=10

# Inference Engine Configuration
gollek.inference.local.enabled=true
gollek.inference.default-provider=local
gollek.inference.streaming.enabled=true
gollek.inference.batch-processing.enabled=true

# Model Configuration
gollek.models.default-provider=gguf
gollek.models.auto-download-enabled=true
gollek.models.default-model=Qwen/Qwen2.5-0.5B-Instruct
gollek.model.repo.path=${wayang.gollek.models.dir}
gollek.storage.local.base-path=${wayang.gollek.storage.dir}
inference.model-storage.local.base-path=${wayang.gollek.storage.dir}
gguf.provider.model.base-path=${wayang.gollek.models.dir}/gguf
libtorch.provider.model.base-path=${wayang.gollek.models.dir}/torchscript
djl.provider.model.base-path=${wayang.gollek.models.dir}/djl
transformers.provider.base-path=${wayang.gollek.models.dir}/transformers

# Vault/Secrets Configuration (embedded for standalone)
wayang.vault.type=embedded
wayang.vault.embedded.location=${wayang.secrets.dir}/secrets.dat
wayang.vault.encryption.enabled=false

# Cache Configuration
quarkus.cache.type=caffeine
quarkus.cache.caffeine."schemas".initial-capacity=10
quarkus.cache.caffeine."schemas".maximum-size=100
quarkus.cache.caffeine."schemas".expire-after-write=10M

# Thread Pool Configuration
quarkus.thread-pool.core-threads=8
quarkus.thread-pool.max-threads=200
quarkus.thread-pool.queue-size=1000

mp.jwt.verify.publickey.location=classpath:jwt/public-key.pem

# Keep schema catalog public in standalone mode even when JWT auth is enabled
quarkus.http.auth.permission.schema-catalog.paths=/v1/schema/catalog,/v1/schema/catalog/*,/api/v1/schema/catalog,/api/v1/schema/catalog/*
quarkus.http.auth.permission.schema-catalog.policy=permit
# Standalone local runtime: disable HTTP auth challenge globally
quarkus.http.auth.permission.standalone-public.paths=/*
quarkus.http.auth.permission.standalone-public.policy=permit

# WebSocket security defaults for standalone:
# keep relaxed by default; can be tightened without code changes.
wayang.websocket.auth.enforce=false
wayang.websocket.auth.require-bearer=true
wayang.websocket.auth.require-tenant=true

# Search failure policy in standalone:
# - fallback: return synthetic link result (200)
# - strict: return 503 when providers are unavailable
wayang.websearch.search.fail-mode=strict

# Trigger integration mode:
# "live" mode can be requested per-trigger via payload key "integrationMode":"live".
# Global and per-channel switches below control whether live mode is honored.
wayang.trigger.integration.live.enabled=false
wayang.trigger.integration.live.probe.enabled=false
wayang.trigger.integration.live.email.enabled=false
wayang.trigger.integration.live.telegram.enabled=false
wayang.trigger.integration.live.kafka.enabled=false
wayang.trigger.integration.live.file.enabled=true

# Reactive Messaging defaults for memory-core emitters
mp.messaging.incoming.planning-requests.enabled=false
mp.messaging.incoming.execution-results.enabled=false
mp.messaging.outgoing.memory-updated.enabled=false
mp.messaging.outgoing.execution-stored.enabled=false
mp.messaging.outgoing.backup-scheduled.enabled=false
mp.messaging.outgoing.backup-events.enabled=false
mp.messaging.outgoing.memory-updated.connector=smallrye-kafka
mp.messaging.outgoing.memory-updated.topic=memory-updated
mp.messaging.outgoing.memory-updated.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.execution-stored.connector=smallrye-kafka
mp.messaging.outgoing.execution-stored.topic=execution-stored
mp.messaging.outgoing.execution-stored.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.backup-scheduled.connector=smallrye-kafka
mp.messaging.outgoing.backup-scheduled.topic=backup-scheduled
mp.messaging.outgoing.backup-scheduled.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.backup-events.connector=smallrye-kafka
mp.messaging.outgoing.backup-events.topic=backup-events
mp.messaging.outgoing.backup-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# Keep local executors visible longer in standalone mode.
# They may not emit periodic heartbeats in local in-process registration.
gamelan.registry.health.threshold=30m
gamelan.registry.stale.threshold=12h
gamelan.registry.cleanup.interval=10m

# Exclude transitive Gamelan infrastructure beans not available in standalone mode
quarkus.arc.exclude-types=tech.kayys.gamelan.kafka.**,tech.kayys.gamelan.grpc.**,tech.kayys.gamelan.core.orchestration.**,tech.kayys.gamelan.config.**,tech.kayys.gamelan.scheduler.DefaultWorkflowScheduler,tech.kayys.gamelan.registry.cache.ExecutorCacheManager,tech.kayys.gollek.sdk.local.**,tech.kayys.gollek.api.rest.HealthResource,tech.kayys.wayang.prompt.core.PromptTemplateResource,tech.kayys.wayang.control.api.ExecutionContractResource,tech.kayys.wayang.control.api.ExecutorRegistryResource,tech.kayys.wayang.control.api.ExecutorRegistryAliasResource,tech.kayys.wayang.control.api.NodeCatalogResource,tech.kayys.wayang.control.api.WidgetRegistryResource,tech.kayys.wayang.control.api.ProjectResource,tech.kayys.wayang.control.service.PluginManagerService,tech.kayys.wayang.memory.scheduler.MemoryMaintenanceScheduler,tech.kayys.wayang.agent.**
quarkus.arc.ignored-split-packages=tech.kayys.wayang,tech.kayys.gamelan.registry,tech.kayys.wayang.agent

# Ensure REST resources from dependency modules are indexed in uber-jar mode
quarkus.index-dependency.gamelan-engine.group-id=tech.kayys.gamelan
quarkus.index-dependency.gamelan-engine.artifact-id=gamelan-engine
quarkus.index-dependency.gamelan-runtime-core.group-id=tech.kayys.gamelan
quarkus.index-dependency.gamelan-runtime-core.artifact-id=gamelan-runtime-core
quarkus.index-dependency.gollek-api-rest.group-id=tech.kayys.gollek
quarkus.index-dependency.gollek-api-rest.artifact-id=gollek-api-rest

# Index Wayang core modules for bean discovery in standalone mode
quarkus.index-dependency.wayang-control-core.group-id=tech.kayys.wayang
quarkus.index-dependency.wayang-control-core.artifact-id=wayang-control-core
